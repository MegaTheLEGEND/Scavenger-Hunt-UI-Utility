services:
  scavenger-hunt:
    build:
      context: https://github.com/MegaTheLEGEND/Scavenger-Hunt-UI-Utility.git
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme   # <-- change this!
    volumes:
      - ./data:/app/data
      - ./public/images:/app/public/images
    restart: unless-stopped
